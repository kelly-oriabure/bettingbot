# Deploy BettingBot to Coolify
name: Deploy to Coolify

on:
  push:
    branches: [main]

env:
  DOCKER_IMAGE: obehiaye/bettingbot:latest
  COOLIFY_URL: https://coolify.firmoncloud.com
  COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "${{ env.COOLIFY_URL }}/api/v1/applications/${{ env.COOLIFY_APP_UUID }}/start"
          echo "✅ Coolify deploy triggered"
